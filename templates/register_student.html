{% extends "base.html" %}
{% block title %}Student Registration{% endblock %}
{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-md-7">
        <div class="card p-4">
            <div class="card-body">
                <h3 class="mb-4"><i class="bi bi-person-plus text-success me-2"></i>Student Registration</h3>
                <form method="POST" novalidate>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Full Name *</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email *</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Password *</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone *</label>
                            <input type="text" name="phone" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Branch *</label>
                            <select name="branch" class="form-select" required>
                                <option value="">Select Branch</option>
                                <option>Computer Science</option>
                                <option>Information Technology</option>
                                <option>Electronics</option>
                                <option>Mechanical</option>
                                <option>Civil</option>
                                <option>Electrical</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">CGPA *</label>
                            <input type="number" step="0.01" min="0" max="10" name="cgpa" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Graduation Year *</label>
                            <input type="number" name="graduation_year" class="form-control" min="2020" max="2030" required>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-success w-100">Register</button>
                        </div>
                        <div class="col-12 text-center">
                            <a href="/login">Already have an account? Login</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
