{% extends "base.html" %}
{% block title %}Create Placement Drive{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h3 class="mb-4"><i class="bi bi-plus-circle me-2 text-primary"></i>Create Placement Drive</h3>
            <form method="POST">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Job Title *</label>
                        <input type="text" name="job_title" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Job Description *</label>
                        <textarea name="job_description" class="form-control" rows="4" required></textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Eligibility Criteria *</label>
                        <textarea name="eligibility" class="form-control" rows="2" required
                                  placeholder="e.g., CGPA >= 7.0, CSE/IT branches only"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Application Deadline *</label>
                        <input type="date" name="deadline" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Salary (LPA)</label>
                        <input type="text" name="salary" class="form-control" placeholder="e.g., 8-12 LPA">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Location</label>
                        <input type="text" name="location" class="form-control">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary me-2">Submit for Approval</button>
                        <a href="/company/dashboard" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
